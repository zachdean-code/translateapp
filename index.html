<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross-Cultural Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
padding:40px;
transition:.3s;
margin:0;
}

body.dark{
background:#121212;
}

.container{
width:760px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

body.dark .container{
background:#1f1f1f;
color:white;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:20px;
flex-wrap:wrap;
}

.languageSwitcher{
display:flex;
align-items:center;
gap:10px;
}

.languageSwitcher label{
font-weight:600;
}

.languageSwitcher select{
margin-bottom:0;
min-width:220px;
}

h1{
text-align:center;
font-weight:700;
font-size:36px;
margin:10px 0;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
font-weight:400;
}

body.dark .subtitle{
color:#bbb;
}

textarea{
width:100%;
padding:12px;
font-size:16px;
margin-top:6px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
resize:vertical;
font-family:'Inter',sans-serif;
}

body.dark textarea{
background:#2c2c2c;
border:1px solid #444;
color:white;
}

select{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
font-family:'Inter',sans-serif;
}

body.dark select{
background:#2c2c2c;
border:1px solid #444;
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#2d7ef7;
color:white;
font-size:15px;
cursor:pointer;
margin-right:8px;
font-family:'Inter',sans-serif;
}

button.secondary{
background:#555;
}

button.slow{
background:#1b9a59;
}

button.normal{
background:#e08b00;
}

button.darkToggle{
background:#333;
margin-right:0;
}

.buttonRow{
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.buttonRow button{
margin-right:0;
}

label{
font-weight:600;
}

footer{
text-align:center;
margin-top:30px;
color:#777;
font-size:13px;
line-height:1.6;
}

body.dark footer{
color:#aaa;
}

@media (max-width: 820px){
body{
padding:18px;
}
.container{
width:100%;
padding:22px;
}
.topBar{
flex-direction:column;
align-items:stretch;
}
button.darkToggle{
width:100%;
}
}
</style>
</head>

<body>
<div class="container">

<div class="topBar">
<div class="languageSwitcher">
<label for="siteLanguage" id="uiLanguageLabel">Site Language</label>
<select id="siteLanguage" onchange="changeSiteLanguage()">
<option value="en">English</option>
<option value="es">Español</option>
<option value="es-419">Español LATAM</option>
<option value="de">Deutsch</option>
<option value="fr">Français</option>
<option value="it">Italiano</option>
<option value="zh">中文</option>
<option value="ko">한국어</option>
<option value="ja">日本語</option>
<option value="ru">Русский</option>
</select>
</div>

<button class="darkToggle" onclick="toggleDarkMode()" id="darkModeButton">🌙 Dark Mode</button>
</div>

<h1 id="pageTitle">Cross-Cultural Translator</h1>

<p class="subtitle" id="pageSubtitle">
More than translation — cross-cultural communication.
</p>

<label id="inputLabel" for="userInput">Input Text</label>
<textarea id="userInput" rows="4" placeholder="Type or paste text here..."></textarea>

<label id="translateToLabel" for="targetLanguage">Translate To</label>
<select id="targetLanguage"></select>

<div class="buttonRow">
<button onclick="translateText()" id="translateButton">Translate</button>
<button class="secondary" onclick="copyTranslation()" id="copyButton">Copy</button>
<button class="slow" onclick="speakSlow()" id="speakSlowButton">Speak Slowly</button>
<button class="normal" onclick="speakNormal()" id="speakNormalButton">Speak Normally</button>
</div>

<label id="translationLabel" for="output">Translation</label>
<textarea id="output" rows="4" readonly placeholder="Your translation will appear here..."></textarea>

<label id="pronunciationLabel" for="pronunciation">Pronunciation Guide</label>
<textarea id="pronunciation" rows="3" readonly placeholder="Pronunciation guide will appear here..."></textarea>

<footer>
<span id="footerLine1">© 2026 CCTLA-TBD, LLC</span><br>
<span id="footerLine2">Cross-Cultural Translator™</span><br>
<span id="footerLine3">More than translation — cross-cultural communication.</span><br>
<span id="footerLine4">Patent pending.</span>
</footer>

</div>

<script src="translations.js"></script>
<script src="script.js"></script>
</body>
</html>
