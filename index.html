<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross-Cultural Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="topBar">
      <div class="languageGroup">
        <label for="siteLanguage">Site Language</label>
        <select id="siteLanguage" class="miniSelect">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="pt-BR">Português (Brasil)</option>
        </select>
      </div>

      <button id="darkModeButton" class="darkToggle" type="button">🌙 Dark</button>
    </div>

    <h1>Cross-Cultural Translator™</h1>
    <p class="subtitle"></p>
    <p class="description"></p>

    <div class="translatorRow">

      <div class="inputColumn">

        <label id="inputLabel" for="userInput"></label>
        <textarea id="userInput"></textarea>

        <div id="detectedCard" class="detectedCard hidden">
          <div id="detectedLanguageDialect"></div>

          <div class="detectedButtons">
            <button id="keepDetectedButton" class="keepButton" type="button">Keep</button>
            <button id="changeDetectedButton" class="changeButton" type="button">Change</button>
          </div>
        </div>

        <div id="changeDetectedWrap" class="hidden">
          <label for="detectedSearch"></label>
          <div class="searchWrap">
            <input id="detectedSearch" type="text" autocomplete="off">
            <div id="detectedSuggestions" class="suggestions"></div>
          </div>
        </div>

        <label for="targetSearch"></label>

        <div class="searchWrap">
          <input id="targetSearch" type="text" autocomplete="off">
          <div id="targetSuggestions" class="suggestions"></div>
        </div>

        <div class="modeToggle" role="group" aria-label="Translation mode">
          <button id="simpleModeButton" class="modeButton active" type="button"></button>
          <button id="enhancedModeButton" class="modeButton" type="button"></button>
        </div>

        <div id="contextPanel" class="contextPanel hidden">
          <div class="contextControl">
            <label for="audienceSelect" id="audienceLabel"></label>
            <select id="audienceSelect"></select>
          </div>

          <div class="contextControl">
            <label for="toneSelect" id="toneLabel"></label>
            <select id="toneSelect"></select>
          </div>

          <div class="contextControl">
            <label for="goalSelect" id="goalLabel"></label>
            <select id="goalSelect"></select>
          </div>

          <div class="contextControl">
            <label for="contextModeSelect" id="contextModeLabel"></label>
            <select id="contextModeSelect"></select>
          </div>

          <div class="contextControl fullWidth">
            <label for="situationInput" id="situationLabel"></label>
            <input id="situationInput" type="text" autocomplete="off">
          </div>

          <label class="inlineCheck" for="includeInfoToggle">
            <input id="includeInfoToggle" type="checkbox" checked>
            <span id="includeInfoLabel"></span>
          </label>
        </div>

        <button id="translateButton" type="button"></button>

      </div>

      <div class="outputColumn">

        <label for="output"></label>
        <textarea id="output" readonly tabindex="-1"></textarea>

        <button id="copyButton" type="button"></button>

        <label class="inlineCheck" for="pronToggle">
          <input id="pronToggle" type="checkbox">
          <span id="pronunciationToggleLabel"></span>
        </label>

        <div id="pronunciationSection" class="hidden">
          <label for="pronunciationOutput" id="pronunciationLabel"></label>
          <textarea id="pronunciationOutput" readonly></textarea>
          <div class="pronunciationButtons">
            <button id="speakNormalButton" type="button"></button>
            <button id="speakSlowButton" type="button"></button>
          </div>
        </div>

        <div id="additionalInfoSection" class="hidden">
          <label for="additionalInfo"></label>
          <textarea id="additionalInfo" readonly></textarea>
        </div>

      </div>

    </div>

    <div id="footerText"></div>

  </div>

  <script src="helpers.js"></script>
  <script src="languageCatalog.js"></script>
  <script src="uiText.js"></script>
  <script src="contextConfig.js"></script>
  <script src="pronunciation.js"></script>
  <script src="script.js"></script>
</body>
</html>
