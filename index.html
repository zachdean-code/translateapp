<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cross-Cultural Translator</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
padding:40px;
transition:0.3s;
}

.dark body{
background:#1b1b1b;
}

.container{
width:760px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
transition:0.3s;
}

.dark .container{
background:#2a2a2a;
color:white;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.dark .subtitle{
color:#bbb;
}

textarea{
width:100%;
padding:10px;
font-size:16px;
margin-top:5px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
resize:vertical;
}

.dark textarea{
background:#3b3b3b;
color:white;
border:1px solid #555;
}

select{
width:100%;
padding:10px;
font-size:16px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}

.dark select{
background:#3b3b3b;
color:white;
border:1px solid #555;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#2d7ef7;
color:white;
font-size:16px;
cursor:pointer;
margin-right:8px;
}

button.secondary{
background:#555;
}

button.slow{
background:#1b9a59;
}

button.normal{
background:#e08b00;
}

button.darkmode{
background:#333;
float:right;
}

.buttonRow{
margin-bottom:20px;
}

label{
font-weight:bold;
}

footer{
text-align:center;
margin-top:30px;
color:#777;
font-size:13px;
line-height:1.6;
}

.dark footer{
color:#aaa;
}

</style>

</head>

<body>

<div class="container">

<button class="darkmode" onclick="toggleDarkMode()">Dark Mode</button>

<h1>Cross-Cultural Translator</h1>

<p class="subtitle">
More than translation — cross-cultural communication
</p>

<label>Input Text</label>

<textarea id="userInput" rows="4"></textarea>

<label>Translate To</label>

<select id="targetLanguage">

<option value="American English">American English</option>
<option value="British English">British English</option>
<option value="Australian English">Australian English</option>
<option value="French">French</option>
<option value="German">German</option>
<option value="Mexican Spanish">Mexican Spanish</option>
<option value="LATAM Spanish">LATAM Spanish</option>
<option value="General Colombian Spanish">General Colombian</option>
<option value="Paisa Spanish (Medellín)">Paisa - Medellín</option>
<option value="Rolo Spanish (Bogotá)">Rolo - Bogotá</option>
<option value="Cali Spanish">Cali</option>
<option value="Santander Spanish">Santander</option>
<option value="Venezuelan Spanish">Venezuelan</option>

</select>

<div class="buttonRow">

<button onclick="translateText()">Translate</button>

<button class="secondary" onclick="copyTranslation()">Copy</button>

<button class="slow" onclick="speakSlow()">Speak Slowly</button>

<button class="normal" onclick="speakNormal()">Speak Normally</button>

</div>

<label>Translation</label>

<textarea id="output" rows="4" readonly></textarea>

<label>Pronunciation Guide</label>

<textarea id="pronunciation" rows="3" readonly></textarea>

<footer>

© 2026 CCTLA-TBD, LLC  
<br>
Cross-Cultural Translator™  
<br>
More than translation — cross-cultural communication.  
<br>
Patent pending.

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
