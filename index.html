<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translate App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Translate App</h1>
        <p class="subtitle">Paste text, choose the output language or dialect, and translate.</p>

        <label for="userInput">Text to translate</label>
        <textarea
          id="userInput"
          placeholder="Type or paste text here..."
          rows="8"
        ></textarea>

        <label for="targetLanguage">Translate to</label>
        <select id="targetLanguage">
          <option value="American English" selected>American English</option>
          <option value="British English">British English</option>
          <option value="Australian English">Australian English</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Mexican Spanish">Mexican Spanish</option>
          <option value="LATAM Spanish">LATAM Spanish</option>
          <option value="General Colombian Spanish">General Colombian</option>
          <option value="Paisa Spanish (Medellín)">Paisa - Medellín</option>
          <option value="Rolo Spanish (Bogotá)">Rolo - Bogotá</option>
          <option value="Cali Spanish">Cali</option>
          <option value="Santander Spanish">Santander</option>
          <option value="Venezuelan Spanish">Venezuelan</option>
        </select>

        <div class="button-row">
          <button onclick="translateText()">Translate</button>
          <button onclick="copyOutput()" class="secondary">Copy Translation</button>
        </div>

        <label for="output">Translation</label>
        <textarea
          id="output"
          placeholder="Your translation will appear here..."
          rows="8"
          readonly
        ></textarea>

        <label for="pronunciation">Pronunciation</label>
        <textarea
          id="pronunciation"
          placeholder="Pronunciation guide will appear here..."
          rows="6"
          readonly
        ></textarea>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
