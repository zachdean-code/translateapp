<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross-Cultural Translator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="topBar">

<div class="languageGroup">
<label for="siteLanguage">Site Language</label>
<select id="siteLanguage" class="miniSelect">
<option value="en">English</option>
<option value="es">Español</option>
</select>
</div>

<button id="darkModeButton">🌙 Dark</button>

</div>

<h1>Cross-Cultural Translator™</h1>

<p class="subtitle">
Beyond translation — real cross-cultural communication
</p>

<p class="description">
Dialect-aware translation, pronunciation guidance, and cultural clarity
</p>


<div class="translatorRow">

<!-- LEFT COLUMN -->

<div class="inputColumn">

  <label for="userInput">Input Text</label>
  <textarea id="userInput" rows="6"></textarea>

  <label for="targetSearch">Translate To</label>
  <input id="targetSearch" type="text">
  <div id="targetSuggestions" class="suggestions"></div>

  <button id="translateButton" class="primaryButton">Translate</button>

</div>

<!-- RIGHT COLUMN -->
<div class="outputColumn">

<label for="output">Translation</label>
<textarea id="output" rows="6" readonly></textarea>

<button id="copyButton" class="copyButton">Copy</button>

<div id="usageNoteSection" class="hidden">
<label>Usage Note</label>
<textarea id="usageNote" rows="3" readonly></textarea>
</div>

<div class="toggleRow">
<input type="checkbox" id="pronToggle">
<label>Show Pronunciation</label>
</div>

<div id="pronunciationSection" class="hidden">
<label>Pronunciation Guide</label>
<textarea id="pronunciation" rows="4" readonly></textarea>

<div class="buttonRow">
<button id="speakSlowButton" class="slowButton">Speak Slowly</button>
<button id="speakNormalButton" class="normalButton">Speak Normally</button>
</div>
</div>

</div>

</div>

</div>

<script src="translations.js"></script>
<script src="languageCatalog.js"></script>
<script src="script.js"></script>

</body>
</html>
