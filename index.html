<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross-Cultural Translator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#122071">
</head>
<body>
  <div class="container">

    <div class="topBar">
      <div class="languageGroup">
        <label for="siteLanguage">Site Language</label>
        <select id="siteLanguage" class="miniSelect">
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>

      <button id="darkModeButton" class="darkToggle" type="button">🌙 Dark</button>
    </div>

    <h1>Cross-Cultural Translator™</h1>

    <p class="subtitle">
      Beyond translation — real cross-cultural communication
    </p>

    <p class="description">
      Dialect-aware translation and cultural clarity
    </p>

    <div class="translatorRow">

      <div class="inputColumn">

        <label id="inputLabel" for="userInput">Input Text</label>
        <textarea id="userInput"></textarea>

        <div id="detectedCard" class="detectedCard hidden">
          <div id="detectedLanguageDialect"></div>

          <div class="detectedButtons">
            <button id="keepDetectedButton" class="keepButton" type="button">
              Keep
            </button>

            <button id="changeDetectedButton" class="changeButton" type="button">
              Change
            </button>
          </div>
        </div>

        <div id="changeDetectedWrap" class="hidden">
          <label for="detectedSearch">Change input language to:</label>

          <div class="searchWrap">
            <input
              id="detectedSearch"
              type="text"
              autocomplete="off"
            >
            <div id="detectedSuggestions" class="suggestions"></div>
          </div>
        </div>

        <label for="targetSearch">Translate To</label>

        <div class="searchWrap">
          <input
            id="targetSearch"
            type="text"
            autocomplete="off"
          >
          <div id="targetSuggestions" class="suggestions"></div>
        </div>

        <button id="translateButton" class="primaryButton" type="button">
          Translate
        </button>

      </div>

      <div class="outputColumn">

        <label for="output">Translation</label>
        <textarea id="output" readonly></textarea>

        <button id="copyButton" class="copyButton" type="button">
          Copy
        </button>

        <div id="additionalInfoSection" class="hidden">
          <label for="additionalInfo">Additional Information</label>
          <textarea id="additionalInfo" readonly></textarea>
        </div>

      </div>

    </div>

    <div id="footerText"></div>

  </div>

  <script src="helpers.js"></script>
  <script src="languageCatalog.js"></script>
  <script src="uiText.js"></script>
  <script src="contextConfig.js"></script>
  <script src="script.js"></script>
</body>
</html>
