<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross-Cultural Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="topBar">
      <div class="languageGroup">
        <label for="siteLanguage">Site Language</label>
        <select id="siteLanguage" class="miniSelect">
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>

      <button id="darkModeButton" class="darkToggle" type="button">🌙 Dark</button>
    </div>

    <h1>Cross-Cultural Translator™</h1>
    <p class="subtitle"></p>
    <p class="description"></p>

    <div class="translatorRow">

      <div class="inputColumn">

        <label id="inputLabel" for="userInput"></label>
        <textarea id="userInput"></textarea>

        <div id="detectedCard" class="detectedCard hidden">
          <div id="detectedLanguageDialect"></div>

          <div class="detectedButtons">
            <button id="keepDetectedButton" class="keepButton" type="button">Keep</button>
            <button id="changeDetectedButton" class="changeButton" type="button">Change</button>
          </div>
        </div>

        <div id="changeDetectedWrap" class="hidden">
          <label for="detectedSearch"></label>
          <div class="searchWrap">
            <input id="detectedSearch" type="text" autocomplete="off">
            <div id="detectedSuggestions" class="suggestions"></div>
          </div>
        </div>

        <label for="targetSearch"></label>

        <div class="searchWrap">
          <input id="targetSearch" type="text" autocomplete="off">
          <div id="targetSuggestions" class="suggestions"></div>
        </div>

        <button id="translateButton" class="primaryButton" type="button"></button>

      </div>

      <div class="outputColumn">

        <label for="output"></label>
        <textarea id="output" readonly tabindex="-1"></textarea>

        <button id="copyButton" class="copyButton" type="button"></button>

        <div id="additionalInfoSection" class="hidden">
          <label for="additionalInfo"></label>
          <textarea id="additionalInfo" readonly></textarea>
        </div>

      </div>

    </div>

    <div id="footerText"></div>

  </div>

  <script src="helpers.js"></script>
  <script src="contextConfig.js"></script>
  <script src="languageCatalog.js"></script>
  <script src="uiText.js"></script>
  <script src="pronunciation.js"></script>
  <script src="script.js"></script>
</body>
</html>
