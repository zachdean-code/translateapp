<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cross-Cultural Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="topBar">

<div class="languageGroup">
<label>Site Language</label>

<select id="siteLanguage">

<option value="en">English</option>
<option value="es">Español</option>
<option value="pt">Português</option>
<option value="fr">Français</option>
<option value="de">Deutsch</option>
<option value="it">Italiano</option>
<option value="zh">中文</option>
<option value="ja">日本語</option>
<option value="ko">한국어</option>
<option value="ru">Русский</option>
<option value="ar">العربية</option>
<option value="hi">हिन्दी</option>
<option value="id">Bahasa Indonesia</option>
<option value="tl">Filipino</option>
<option value="sw">Kiswahili</option>
<option value="am">አማርኛ</option>
<option value="fa">فارسی</option>
<option value="tr">Türkçe</option>

</select>
</div>

<button onclick="toggleDark()">🌙</button>

</div>


<h1>Cross-Cultural Translator™</h1>

<p class="subtitle">
Beyond translation — real cross-cultural communication
</p>


<label>Input Text</label>

<textarea id="inputText"></textarea>


<div class="detectedBox">

Detected Language:
<span id="detectedLanguage">—</span>

Confidence:
<span id="confidence">—</span>

<button onclick="changeDetected()">Change</button>

</div>


<label>Translate To</label>

<input id="languageSearch" placeholder="Type language or dialect">

<div id="suggestions"></div>


<button onclick="translate()">Translate</button>


<label>Translation</label>

<textarea id="outputText" readonly></textarea>

<button onclick="copy()">Copy</button>


<label>

<input type="checkbox" id="pronToggle">

Show Pronunciation

</label>


<textarea id="pronunciationBox" readonly></textarea>


<button onclick="speakSlow()">Speak Slowly</button>

<button onclick="speakNormal()">Speak Normally</button>


<footer>

<strong>Cross-Cultural Translator™</strong>

<br>

Beyond translation — real cross-cultural communication

<br>

© 2026 CCTLA-TBD LLC

</footer>

</div>


<script src="languageCatalog.js"></script>

<script src="script.js"></script>

</body>
</html>
