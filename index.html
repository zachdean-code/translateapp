<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross-Cultural Translator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="topBar">
    <div class="languageGroup">
      <label>Site Language</label>
      <select id="siteLanguage">
        <option value="en">English</option>
        <option value="es">Español</option>
      </select>
    </div>

    <button id="darkModeButton">🌙 Dark</button>
  </div>

  <h1>Cross-Cultural Translator™</h1>

  <p class="subtitle">
    Beyond translation — real cross-cultural communication
  </p>

  <p class="description">
    Dialect-aware translation, pronunciation guidance, and cultural clarity
  </p>

  <div class="translatorRow">

    <!-- LEFT SIDE -->
    <div class="inputColumn">

      <label>Input Text</label>
      <textarea id="userInput"></textarea>

      <div class="contextToggleRow">
        <input id="contextToggle" type="checkbox">
        <label>Enhanced Context Mode</label>
      </div>

      <div id="contextSection" class="hidden">

        <div>
          <label>To Whom?</label>
          <select id="contextAudience">
            <option value=""></option>
            <option value="friend">Friend</option>
            <option value="romantic">Romantic</option>
            <option value="professional">Professional</option>
          </select>
        </div>

        <div>
          <label>Intent / Tone</label>
          <select id="contextTone">
            <option value=""></option>
            <option value="casual">Casual</option>
            <option value="formal">Formal</option>
          </select>
        </div>

        <div>
          <label>Situation</label>
          <select id="contextSituation">
            <option value=""></option>
            <option value="travel">Travel</option>
            <option value="business">Business</option>
          </select>
        </div>

      </div>

      <label>Translate To</label>
      <input id="targetSearch">

      <button id="translateButton">Translate</button>

    </div>

    <!-- RIGHT SIDE -->
    <div class="outputColumn">

      <div class="translationHeader">
        <label>Translation</label>

        <div class="toggleRow">
          <input id="pronToggle" type="checkbox">
          <label>Show Pronunciation</label>
        </div>
      </div>

      <textarea id="output" readonly></textarea>

      <button id="copyButton">Copy</button>

      <div id="pronunciationSection" class="hidden">
        <label>Pronunciation Guide</label>
        <textarea id="pronunciation" readonly></textarea>

        <div class="buttonRow">
          <button id="speakNormal">Speak Normally</button>
          <button id="speakSlow">Speak Slowly</button>
        </div>
      </div>

      <div id="additionalInfoSection" class="hidden">
        <label>Additional Information</label>
        <textarea id="additionalInfo" readonly></textarea>
      </div>

    </div>

  </div>

</div>

<script src="pronunciation.js"></script>
<script src="script.js"></script>

</body>
</html>
