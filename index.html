<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cross-Cultural Translator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#122071">
</head>

<body>

<div class="container">

  <!-- Top Bar -->
  <div class="topBar">
    <div class="languageGroup">
      <label for="siteLanguage">Site Language</label>
      <select id="siteLanguage" class="miniSelect">
        <option value="en">English</option>
        <option value="es">Español</option>
      </select>
    </div>

    <button id="darkModeButton" class="darkToggle">🌙 Dark</button>
  </div>

  <!-- Header -->
  <h1>Cross-Cultural Translator™</h1>

  <p class="subtitle">
    Beyond translation — real cross-cultural communication
  </p>

  <p class="description">
    Dialect-aware translation, pronunciation guidance, and cultural clarity
  </p>

  <!-- MAIN GRID -->
  <div class="translatorRow">

    <!-- LEFT -->
    <div class="inputColumn">

      <label for="userInput">Input Text</label>
      <textarea id="userInput"></textarea>

      <div class="contextToggleRow">
        <input id="contextToggle" type="checkbox">
        <label for="contextToggle">Enhanced Context Mode</label>
      </div>

      <label for="targetSearch">Translate To</label>
      <input id="targetSearch" type="text">

      <button id="translateButton" class="primaryButton">
        Translate
      </button>

    </div>

    <!-- RIGHT -->
    <div class="outputColumn">

      <div class="translationHeader">
        <label for="output">Translation</label>

        <div class="toggleRow">
          <input id="pronToggle" type="checkbox">
          <label for="pronToggle">Show Pronunciation</label>
        </div>
      </div>

      <textarea id="output" readonly></textarea>

      <button id="copyButton" class="copyButton">
        Copy
      </button>

      <!-- Pronunciation -->
      <div id="pronunciationSection" class="hidden">
        <label for="pronunciation">Pronunciation Guide</label>
        <textarea id="pronunciation" readonly></textarea>

        <div class="buttonRow">
          <button id="speakNormal" class="normalButton">Speak Normally</button>
          <button id="speakSlow" class="slowButton">Speak Slowly</button>
        </div>
      </div>

      <!-- Additional Info -->
      <div id="additionalInfoSection" class="hidden">
        <label for="additionalInfo">Additional Information</label>
        <textarea id="additionalInfo" readonly></textarea>
      </div>

    </div>

  </div>

</div>

<script src="translations.js"></script>
<script src="languageCatalog.js"></script>
<script src="pronunciation.js"></script>
<script src="script.js"></script>

</body>
</html>
